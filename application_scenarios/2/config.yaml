package: 'aviary'
name: 'TilePipeline'
config:
  show_progress: true

  grid_config:
    bounding_box_coordinates:
      - 362000
      - 5714500
      - 364000
      - 5716500
    tile_size: 500

  tile_fetcher_config:
    package: 'aviary'
    name: 'CompositeFetcher'
    config:
      tile_fetcher_configs:
        - package: 'aviary'
          name: 'WMSFetcher'
          config:
            url: 'https://www.wms.nrw.de/geobasis/wms_nw_dop'
            version: '1.3.0'
            layer: 'nw_dop_rgb'
            epsg_code: 25832
            response_format: 'image/png'
            channel_names:
              - 'r'
              - 'g'
              - 'b'
            tile_size: 500
            ground_sampling_distance: .2
        - package: 'aviary'
          name: 'GPKGFetcher'
          config:
            path: 'building_footprints.gpkg'
            epsg_code: 25832
            channel_name: 'building_footprints'
            tile_size: 500

  tile_loader_config:
    batch_size: 4
    max_num_threads: null
    num_prefetched_tiles: 1

  tiles_processor_config:
    package: 'aviary'
    name: 'SequentialCompositeProcessor'
    config:
      tiles_processor_configs:
        - package: 'aviary'
          name: 'RasterExporter'
          config:
            channel_names:
              - 'r'
              - 'g'
              - 'b'
            epsg_code: 25832
            path: 'output/rgb'
        - package: 'aviary'
          name: 'RasterizeProcessor'
          config:
            channel_name: 'building_footprints'
            ground_sampling_distance: .2
            foreground_value: 1
            background_value: 0
            dtype: 'bool'
        - package: 'aviary'
          name: 'RasterExporter'
          config:
            channel_names: 'building_footprints'
            epsg_code: 25832
            path: 'output/building_footprints'
